<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFA Media Tracker</title>
<style>
:root{
  --ink:#1b2333;        /* header / nav */
  --ink2:#252f45;
  --paper:#f4f4f1;      /* app background */
  --card:#ffffff;
  --line:#e3e3dd;
  --text:#2c3444;
  --mut:#7a8194;
  --media:#3f7a55;      /* media green — matches map app media rentals */
  --media-soft:#e8f1ea;
  --owned:#7c4a7c;      /* store owned purple — matches map app */
  --amber:#c98a1b;
  --amber-soft:#faf3e3;
  --rose:#b8484e;
  --rose-soft:#f9e9ea;
  --blue:#3d6fa8;
  --blue-soft:#e8eff8;
  --dot-nr:#c0453f; --dot-rc:#d9a520; --dot-sc:#3d6fa8; --dot-rn:#3f7a55;
  --rad:8px;
  --shadow:0 1px 3px rgba(27,35,51,.08),0 4px 14px rgba(27,35,51,.05);
  font-size:15px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Avenir Next","Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,sans-serif;background:var(--paper);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font:inherit;color:var(--text)}
::selection{background:var(--media-soft)}

/* ── Top bar ─────────────────────────────────────── */
#topbar{background:var(--ink);color:#fff;display:flex;align-items:center;gap:18px;padding:0 20px;height:52px;flex:none}
#topbar .logo{font-weight:700;letter-spacing:.14em;font-size:.82rem;text-transform:uppercase}
#topbar .logo b{color:#8fd3a8}
#topbar .env{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:#8b93a8;border:1px solid #3a4460;border-radius:4px;padding:2px 8px}
#topbar .sp{flex:1}
#globalSearch{background:var(--ink2);border:1px solid #3a4460;border-radius:6px;color:#fff;padding:6px 12px;width:280px;font-size:.85rem}
#globalSearch::placeholder{color:#7d859c}
#topbar .who{width:32px;height:32px;border-radius:50%;background:#3f7a55;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700}

/* ── Shell: rail + main ──────────────────────────── */
#shell{flex:1;display:flex;min-height:0}
#rail{width:196px;flex:none;background:#fff;border-right:1px solid var(--line);padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.navbtn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;font-size:.88rem;color:#4c5468;text-align:left;width:100%}
.navbtn .ic{width:18px;text-align:center;flex:none}
.navbtn:hover{background:#f2f4f0}
.navbtn.on{background:var(--media-soft);color:var(--media);font-weight:600}
.rail-sec{font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:#a3a9ba;padding:14px 12px 4px}
#main{flex:1;overflow-y:auto;padding:22px 26px 60px;min-width:0}

/* ── Common bits ─────────────────────────────────── */
.pgtitle{display:flex;align-items:baseline;gap:14px;margin-bottom:16px}
.pgtitle h1{font-size:1.25rem;font-weight:700;letter-spacing:-.01em}
.pgtitle .sub{color:var(--mut);font-size:.85rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow)}
.card h2{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:#5a627a;padding:14px 18px 0}
.chip{display:inline-flex;align-items:center;gap:5px;background:#f0f1ee;border:1px solid var(--line);border-radius:20px;padding:2px 10px;font-size:.76rem;color:#4c5468;cursor:pointer;white-space:nowrap}
.chip:hover{border-color:var(--media);color:var(--media)}
.pill{display:inline-block;border-radius:4px;padding:2px 8px;font-size:.7rem;font-weight:600;letter-spacing:.03em}
.pill.active{background:var(--media-soft);color:var(--media)}
.pill.draft{background:#eef0f4;color:#5a627a}
.pill.completed{background:var(--blue-soft);color:var(--blue)}
.pill.cancelled{background:var(--rose-soft);color:var(--rose)}
.pill.beauty{background:#f6ecf4;color:#8a4a80}
.pill.swt{background:#f3ede3;color:#8a6a2a}
.pill.wja{background:#e9eef6;color:#3d5a8a}
table.grid{width:100%;border-collapse:collapse;font-size:.85rem}
table.grid th{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:#8a90a2;text-align:left;padding:10px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
table.grid td{padding:11px 14px;border-bottom:1px solid #eeeeea;vertical-align:top}
table.grid tr.rowlink{cursor:pointer}
table.grid tr.rowlink:hover td{background:#f7f8f5}
.mut{color:var(--mut)}.sm{font-size:.78rem}.b{font-weight:600}
.money{font-variant-numeric:tabular-nums}

/* ── Status rail (the 4-dot content pipeline) ─────── */
.rail4{display:inline-flex;align-items:center}
.rail4 .d{width:10px;height:10px;border-radius:50%;border:2px solid #cfd2c9;background:#fff;flex:none}
.rail4 .l{width:14px;height:2px;background:#cfd2c9;flex:none}
.rail4 .d.f1{border-color:var(--dot-nr);background:var(--dot-nr)}
.rail4 .d.f2{border-color:var(--dot-rc);background:var(--dot-rc)}
.rail4 .d.f3{border-color:var(--dot-sc);background:var(--dot-sc)}
.rail4 .d.f4{border-color:var(--dot-rn);background:var(--dot-rn)}
.rail4 .l.fl{background:#9aa896}
.rail4wrap{display:inline-flex;flex-direction:column;gap:3px;align-items:flex-start}
.rail4lbl{font-size:.66rem;color:var(--mut);letter-spacing:.02em}

/* ── Filters ─────────────────────────────────────── */
.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:14px}
.filters .f{display:flex;flex-direction:column;gap:4px}
.filters label{font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:#8a90a2}
.filters select,.filters input{border:1px solid var(--line);border-radius:6px;padding:7px 10px;background:#fff;font-size:.84rem;min-width:130px}
.btn{border-radius:6px;padding:8px 16px;font-size:.84rem;font-weight:600}
.btn.pri{background:var(--media);color:#fff}
.btn.pri:hover{background:#346546}
.btn.ghost{border:1px solid var(--line);background:#fff;color:#4c5468}
.btn.ghost:hover{border-color:#b8bcae}

/* ── Dashboard ───────────────────────────────────── */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);padding:16px 18px;box-shadow:var(--shadow);cursor:pointer}
.kpi:hover{border-color:#c9cdbf}
.kpi .n{font-size:1.7rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.kpi .t{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:#8a90a2;margin-top:2px}
.kpi .d{font-size:.76rem;margin-top:6px}
.dash2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;align-items:start}
@media(max-width:1100px){.dash2{grid-template-columns:1fr}}

/* ── Activity feed ───────────────────────────────── */
.feed{padding:6px 18px 16px}
.feed .ev{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid #eeeeea}
.feed .ev:last-child{border-bottom:none}
.evtag{flex:none;border-radius:4px;padding:2px 8px;font-size:.66rem;font-weight:700;letter-spacing:.05em;height:fit-content;margin-top:2px}
.evtag.action{background:var(--media-soft);color:var(--media)}
.evtag.notification{background:var(--blue-soft);color:var(--blue)}
.evtag.upload{background:var(--amber-soft);color:var(--amber)}
.ev .meta{font-size:.74rem;color:var(--mut)}
.ev .what{font-size:.86rem;margin-top:2px}
.ev .ctx{font-size:.76rem;color:#5a627a;margin-top:2px;font-weight:600}

/* ── Workflow checklist ──────────────────────────── */
.wf{padding:10px 18px 16px;display:flex;flex-direction:column}
.wf .step{display:flex;gap:12px;padding:9px 12px;border-radius:6px;align-items:flex-start}
.wf .step.done{background:var(--media-soft)}
.wf .cb{width:17px;height:17px;border:2px solid #b9bfae;border-radius:4px;flex:none;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff}
.wf .step.done .cb{background:var(--media);border-color:var(--media)}
.wf .step .t{font-size:.86rem}
.wf .step .t b{font-weight:600}
.wf .step .sub{font-size:.76rem;color:var(--mut)}

/* ── Detail drawer ───────────────────────────────── */
#drawerWrap{position:fixed;inset:0;background:rgba(27,35,51,.35);display:none;z-index:50}
#drawerWrap.open{display:block}
#drawer{position:absolute;top:0;right:0;bottom:0;width:min(880px,94vw);background:var(--paper);box-shadow:-8px 0 30px rgba(27,35,51,.25);display:flex;flex-direction:column;animation:slide .18s ease}
@keyframes slide{from{transform:translateX(30px);opacity:.6}to{transform:none;opacity:1}}
@media(prefers-reduced-motion:reduce){#drawer{animation:none}}
#drawerHead{background:var(--ink);color:#fff;padding:16px 22px;display:flex;align-items:flex-start;gap:14px;flex:none}
#drawerHead h2{font-size:1.02rem;font-weight:700;letter-spacing:-.01em}
#drawerHead .sub{font-size:.76rem;color:#9aa2b8;margin-top:3px}
#drawerHead .x{margin-left:auto;font-size:1.2rem;color:#9aa2b8;padding:2px 8px}
#drawerHead .x:hover{color:#fff}
#drawerBody{flex:1;overflow-y:auto;padding:18px 22px 50px}
.dgrid{display:grid;grid-template-columns:1.25fr 1fr;gap:16px;align-items:start}
@media(max-width:820px){.dgrid{grid-template-columns:1fr}}
.kv{padding:8px 18px 16px}
.kv .row{display:flex;gap:14px;padding:7px 0;border-bottom:1px solid #eeeeea;font-size:.86rem}
.kv .row:last-child{border:none}
.kv .k{width:170px;flex:none;color:#5a627a;font-weight:600;text-align:right}
.kv .v{flex:1;min-width:0}
.stack>*{margin-bottom:16px}

/* ── Calendar: promo grid ────────────────────────── */
.calwrap{overflow-x:auto}
table.cal{border-collapse:collapse;font-size:.78rem;min-width:900px;width:100%}
table.cal th{background:#f0f1ec;border:1px solid var(--line);padding:7px 10px;font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;color:#5a627a}
table.cal td{border:1px solid var(--line);vertical-align:top;padding:0;height:54px;background:#fff}
table.cal td.spacehead{background:#fafaf7;padding:8px 10px;font-weight:700;font-size:.76rem;white-space:nowrap;width:130px}
table.cal td.spacehead .loc{display:block;font-weight:400;color:var(--mut);font-size:.68rem}
.bkg{margin:3px;border-radius:5px;padding:5px 8px;font-size:.72rem;line-height:1.3;cursor:pointer;border-left:3px solid var(--media);background:var(--media-soft)}
.bkg:hover{filter:brightness(.97)}
.bkg .bn{font-weight:700}
.bkg .st{color:#5a627a}
.bkg.owned{border-left-color:var(--owned);background:#f3ecf3}
.bkg.pending{border-left-color:var(--amber);background:var(--amber-soft)}
.calmode{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-left:auto}
.calmode button{padding:7px 14px;font-size:.8rem;background:#fff;color:#5a627a}
.calmode button.on{background:var(--ink);color:#fff}

/* ── Asset/slot calendar ─────────────────────────── */
table.slotcal td.assetcell{width:230px;background:#fafaf7;padding:8px 10px}
table.slotcal .an{font-weight:700;font-size:.78rem}
table.slotcal .ac{font-size:.68rem;color:var(--mut)}
table.slotcal td.slotlbl{width:150px;background:#fdfdfb;padding:6px 10px;font-size:.7rem;border-left:3px solid var(--media)}
table.slotcal td.slotlbl .so{color:var(--mut)}

/* ── Rate cards / packages ───────────────────────── */
.pkcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.pk{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);box-shadow:var(--shadow);padding:16px 18px;display:flex;flex-direction:column;gap:8px}
.pk .nm{font-weight:700;font-size:.92rem}
.pk .rate{font-size:1.25rem;font-weight:700;font-variant-numeric:tabular-nums}
.pk .rate span{font-size:.72rem;font-weight:400;color:var(--mut)}
.pk .inc{font-size:.78rem;color:#5a627a;line-height:1.5}
.pk .foot{margin-top:auto;display:flex;gap:6px;flex-wrap:wrap;padding-top:6px}

/* ── DAM ─────────────────────────────────────────── */
.damprov{display:flex;gap:10px;flex-wrap:wrap;padding:14px 18px}
.damopt{border:1px solid var(--line);border-radius:8px;padding:12px 16px;min-width:190px;cursor:pointer;background:#fff}
.damopt.on{border-color:var(--media);background:var(--media-soft)}
.damopt .n{font-weight:700;font-size:.88rem}
.damopt .d{font-size:.72rem;color:var(--mut);margin-top:2px}
.damstat{font-size:.72rem;margin-top:6px;font-weight:600}
.damstat.ok{color:var(--media)}.damstat.warn{color:var(--amber)}
.note{font-size:.78rem;color:#5a627a;background:var(--amber-soft);border:1px solid #ecd9ae;border-radius:6px;padding:10px 14px;line-height:1.5}
.thumb{width:44px;height:44px;border-radius:6px;background:linear-gradient(135deg,#2b3350,#3f7a55);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;letter-spacing:.05em;flex:none}

/* ── Deal stepper (business pipeline) ─────────────── */
.dealwrap{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.dealstep{font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid var(--line);color:#8a90a2;background:#fff;cursor:pointer;white-space:nowrap}
.dealstep:hover{border-color:#b8bcae}
.dealstep.on{color:#fff;border-color:transparent}
.dealstep.cancelled{color:#fff;background:var(--rose);border-color:transparent}
.dealpill{display:inline-block;border-radius:4px;padding:2px 9px;font-size:.7rem;font-weight:700;color:#fff}

.empty{padding:34px;text-align:center;color:var(--mut);font-size:.86rem}
a.lnk{color:var(--blue);text-decoration:none}
a.lnk:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--media);outline-offset:1px}

/* ── Modal (new booking) ─────────────────────────── */
#modalWrap{position:fixed;inset:0;background:rgba(27,35,51,.4);display:none;z-index:60;align-items:flex-start;justify-content:center;padding:5vh 16px;overflow-y:auto}
#modalWrap.open{display:flex}
#modal{background:var(--paper);border-radius:10px;width:min(680px,100%);box-shadow:0 20px 60px rgba(27,35,51,.35)}
#modal .mh{background:var(--ink);color:#fff;border-radius:10px 10px 0 0;padding:14px 20px;display:flex;align-items:center}
#modal .mh h2{font-size:.95rem;font-weight:700}
#modal .mh .x{margin-left:auto;color:#9aa2b8;font-size:1.1rem;padding:2px 8px}
#modal .mh .x:hover{color:#fff}
#modal .mb{padding:18px 20px 22px}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px}
.formgrid .full{grid-column:1/-1}
.formgrid .f{display:flex;flex-direction:column;gap:4px}
.formgrid label{font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:#8a90a2}
.formgrid input,.formgrid select,.formgrid textarea{border:1px solid var(--line);border-radius:6px;padding:8px 10px;background:#fff;font-size:.86rem;width:100%}
.formfoot{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.wf .step{cursor:pointer}
.wf .step:hover{background:#f2f4f0}
.wf .step.done:hover{background:#dcebe1}
.dirty{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber);margin-left:6px;vertical-align:middle}
.topbtn{border:1px solid #3a4460;border-radius:6px;padding:6px 13px;font-size:.8rem;color:#cfd4e2;font-weight:600}
.topbtn:hover{border-color:#8fd3a8;color:#fff}
.topbtn.pri{background:var(--media);border-color:var(--media);color:#fff}
.topbtn.pri:hover{background:#346546}
.editable-rail{cursor:pointer}
.dangr{color:var(--rose)}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">DFA <b>Media Tracker</b></div>
  <div class="env">Retail Media Network</div>
  <div class="sp"></div>
  <button class="topbtn pri" onclick="openNewBooking()">＋ New booking</button>
  <button class="topbtn" onclick="exportData()" title="Download media_data.json — commit it to dfa_birdseye/Media/ to save permanently">Export data<span id="dirtyDot" style="display:none" class="dirty"></span></button>
  <button class="topbtn" onclick="document.getElementById('importFile').click()">Import</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
  <input id="globalSearch" placeholder="Search orders, brands, assets…" oninput="globalSearch(this.value)">
  <div class="who" id="whoBadge" title="Click to change user" onclick="changeUser()" style="cursor:pointer">JE</div>
</div>

<div id="modalWrap" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div class="mh"><h2 id="modalTitle">New booking</h2><button class="x" onclick="closeModal()" aria-label="Close">✕</button></div>
    <div class="mb" id="modalBody"></div>
  </div>
</div>

<div id="shell">
  <nav id="rail">
    <button class="navbtn on" data-v="dash"   onclick="go('dash')"><span class="ic">◧</span>Dashboard</button>
    <button class="navbtn" data-v="orders" onclick="go('orders')"><span class="ic">▤</span>Orders</button>
    <button class="navbtn" data-v="cal"    onclick="go('cal')"><span class="ic">▦</span>Calendar</button>
    <button class="navbtn" data-v="assets" onclick="go('assets')"><span class="ic">▣</span>Assets</button>
    <div class="rail-sec">Commercial</div>
    <button class="navbtn" data-v="rates"  onclick="go('rates')"><span class="ic">$</span>Rate Cards</button>
    <button class="navbtn" data-v="packs"  onclick="go('packs')"><span class="ic">▩</span>Vendor Packs</button>
    <div class="rail-sec">Content</div>
    <button class="navbtn" data-v="dam"    onclick="go('dam')"><span class="ic">☁</span>Artwork &amp; DAM</button>
    <button class="navbtn" data-v="activity" onclick="go('activity')"><span class="ic">≡</span>Activity</button>
  </nav>
  <main id="main"></main>
</div>

<div id="drawerWrap" onclick="if(event.target===this)closeDrawer()">
  <div id="drawer">
    <div id="drawerHead"></div>
    <div id="drawerBody"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   DFA MEDIA TRACKER — v04
   Single-file app. Data is embedded below (DATA MODE: 'embedded').

   PERSISTENCE MODEL — no server, same pattern as the map app:
   1. Everything you add/edit in-app lives in browser memory only, until
      you click "Export data" → downloads media_data.json.
   2. Commit that file to dfa_birdseye/Media/media_data.json.
   3. On load, the app fetches that URL and overlays it on the embedded
      placeholder/imported data (loadGithubJson(), see bottom of file).
   This means: single active editor per session, no live multi-user sync,
   and "last export wins" if two people edit at once — same tradeoffs
   as the spreadsheet workflow you already use for the map. Good enough
   for one or two planners updating between sessions.
   If/when this needs real concurrent multi-user editing (several people
   updating orders at the same time, audit trail, permissions), that
   requires an actual backend — a small database behind an API, not a
   flat file. Not built here; flag it if usage grows to that point.

   To switch to live GitHub data for ASSETS/RATE_CARDS/PACKAGES, set
   CONFIG.dataSource='github' and publish a workbook at
   CONFIG.githubXlsx matching the sheet schema documented above each
   data block. SheetJS loads from CDN in github mode; on locked-down
   networks, bundle xlsx.full.min.js inline the same way as the map app.
   ═══════════════════════════════════════════════════════════════════ */

var CONFIG = {
  dataSource: 'embedded',            // 'embedded' | 'github'
  githubBase: 'https://jeffenlow.github.io/dfa_birdseye/',
  githubXlsx: 'https://jeffenlow.github.io/dfa_birdseye/Media/DFA_Media_Tracker.xlsx',
  // Expected sheets: Orders, Assets, Bookings, RateCards, Packages, Activity, Artworks
  dam: {
    provider: 'github',              // 'github' | 'bynder' | 'aem'
    github: { base: 'https://jeffenlow.github.io/dfa_birdseye/Artwork/' },
    bynder: { portal: '', token: '' },   // e.g. portal:'dfa.bynder.com'  token: OAuth2 permanent token
    aem:    { host: '',  user: '' }      // e.g. host:'https://author-dfa.adobeaemcloud.com'
  }
};

/* ── Reference data ────────────────────────────────────────────── */

var STATUS_STEPS = ['Not Received','Received','Scheduled','Running'];

/* Business/commercial pipeline — separate from the creative content rail above
   and from the operational workflow checklist. Tracks the deal itself. */
var DEAL_STAGES = ['Proposed','Sent to Brand','Accepted','Contracted','Billed','Paid'];
var DEAL_COLORS = {'Proposed':'#8a90a2','Sent to Brand':'#c98a1b','Accepted':'#3d6fa8','Contracted':'#3d6fa8','Billed':'#7c4a7c','Paid':'#3f7a55','Cancelled':'#b8484e'};

var WORKFLOW_STEPS = [
  'Proposal sent to brand',
  'Proposal approved by brand',
  'Brand artwork uploaded',
  'Artwork approved',
  'Photos Uploaded',
  'Completed'
];
/* Note: the workflow's "Completed" step means the CREATIVE pipeline is
   wrapped (artwork approved, install confirmed) — it is not the same as
   the order's own status (Active/Draft/Completed/Cancelled). A campaign
   can be fully wrapped creatively while still Active and running on
   screen for weeks. Never let wfDone auto-set o.status. */

var CATEGORIES = { beauty:'Beauty', swt:'Spirits, Wine & Tobacco', wja:'Watches, Jewelry & Accessories', fg:'Food and Gifts', fashion:'Fashion' };

/* Assets sheet schema:

/* ═══════════════ helpers ═══════════════ */
var $ = function(s){ return document.querySelector(s); };
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function usd(n){ return 'USD ' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtD(iso){ if(!iso)return ''; var p=iso.split('-'); return p[1]+'/'+p[2]+'/'+p[0]; }
function fmtRange(a,b){ return fmtD(a)+' to '+fmtD(b); }
function monthKey(y,m){ return y+'-'+String(m).padStart(2,'0'); }
function monthLabel(y,m){ return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]+' '+y; }
function overlapsMonth(from,to,y,m){
  var s = new Date(y, m-1, 1), e = new Date(y, m, 0);
  return new Date(from) <= e && new Date(to) >= s;
}
function orderBy(no){ return ORDERS.find(function(o){return o.no===no;}); }
function assetBy(id){ return ASSETS.find(function(a){return a.id===id;}); }
function overlaps(aFrom,aTo,bFrom,bTo){ return aFrom<bTo && aTo>bFrom; }   // strict: a shared boundary day (handoff) is not a collision
/* One asset can only hold one booking per slot at a time. Finds the first
   slot (1..N) on this asset with no date-overlapping booking already in it;
   falls back to slot N (last slot) with a console warning if all are full. */
function findFreeSlot(assetId, dateFrom, dateTo){
  var a = assetBy(assetId); if(!a) return 1;
  var max = a.slots.length || 1;
  for(var s=1; s<=max; s++){
    var clash = BOOKINGS.some(function(b){ return b.assetId===assetId && b.slot===s && overlaps(b.dateFrom,b.dateTo,dateFrom,dateTo); });
    if(!clash) return s;
  }
  console.warn('All '+max+' slots on '+assetId+' are booked for '+dateFrom+'–'+dateTo+' — doubling up on slot '+max);
  return max;
}
function pkgBy(id){ return PACKAGES.find(function(p){return p.id===id;}); }
function rateBy(id){ return RATE_CARDS.find(function(r){return r.id===id;}); }
function catPill(c){ var lbl=CATEGORIES[c]||c; var cls=c==='beauty'?'beauty':(c==='swt'?'swt':'wja'); return '<span class="pill '+cls+'">'+esc(lbl)+'</span>'; }
function statusPill(s){ var cls=s==='Active'?'active':(s==='Completed'?'completed':(s==='Cancelled'?'cancelled':'draft')); return '<span class="pill '+cls+'">'+esc(s)+'</span>'; }
function rail4(level, withLabel){
  // level 0..4 : 0=blank, 1=Not Received .. 4=Running
  var h='<span class="rail4">';
  for(var i=1;i<=4;i++){
    var f = level>=i ? ' f'+i : '';
    h += '<span class="d'+f+'"></span>';
    if(i<4) h += '<span class="l'+(level>i?' fl':'')+'"></span>';
  }
  h+='</span>';
  if(withLabel){
    var lbl = level>0 ? STATUS_STEPS[level-1] : 'No status';
    return '<span class="rail4wrap">'+h+'<span class="rail4lbl">'+lbl+'</span></span>';
  }
  return h;
}
function activityFor(no){ return ACTIVITY.filter(function(e){return e.orderNo===no;}).sort(function(a,b){return b.at<a.at?-1:1;}); }
function dealPill(d){ var c = DEAL_COLORS[d]||'#8a90a2'; return '<span class="dealpill" style="background:'+c+'">'+esc(d||'—')+'</span>'; }
function dealStepper(no, current){
  var stages = DEAL_STAGES.concat(['Cancelled']);
  return '<div class="dealwrap">'+stages.map(function(s){
    var on = s===current;
    var cls = 'dealstep'+(on?' on':'')+(on && s==='Cancelled'?' cancelled':'');
    var style = on && s!=='Cancelled' ? ' style="background:'+(DEAL_COLORS[s]||'#8a90a2')+'"' : '';
    return '<button class="'+cls+'"'+style+' onclick="setDealStatus('+no+',\''+s+'\')">'+esc(s)+'</button>';
  }).join('')+'</div>';
}
function setDealStatus(no, s){
  var o = orderBy(no); if(!o) return;
  o.dealStatus = s;
  logAct(no, 'Deal status → '+s);
  openOrder(no); render();
}
function feedHtml(events, showOrder){
  if(!events.length) return '<div class="empty">No activity yet.</div>';
  return '<div class="feed">'+events.map(function(e){
    var ord = showOrder && e.orderNo ? ' · <a class="lnk" href="#" onclick="openOrder('+e.orderNo+');return false">#'+e.orderNo+' '+esc((orderBy(e.orderNo)||{}).brand||'')+'</a>' : '';
    var to = e.to ? '<div class="ctx sm">to: '+e.to.map(esc).join(', ')+'</div>' : '';
    return '<div class="ev"><span class="evtag '+e.tag+'">'+e.tag+'</span><div>'+
      '<div class="meta">by <b>'+esc(e.by)+'</b> '+esc(e.at)+ord+'</div>'+
      '<div class="what">'+esc(e.what)+'</div>'+
      (e.ctx?'<div class="ctx">'+esc(e.ctx)+'</div>':'')+to+
    '</div></div>';
  }).join('')+'</div>';
}

var CURRENT_USER = 'Jeff Enlow';
var DIRTY = false;

function initials(n){ return n.split(/\s+/).map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase(); }
function changeUser(){
  var n = prompt('Acting as:', CURRENT_USER);
  if(n && n.trim()){ CURRENT_USER = n.trim(); $('#whoBadge').textContent = initials(CURRENT_USER); $('#whoBadge').title = CURRENT_USER; }
}
function nowStamp(){
  var d = new Date();
  function p(x){return String(x).padStart(2,'0');}
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
}
function logAct(orderNo, what, ctx, tag){
  ACTIVITY.unshift({at:nowStamp(), by:CURRENT_USER, tag:tag||'action', what:what, orderNo:orderNo, ctx:ctx||''});
  markDirty();
}
function markDirty(){ DIRTY = true; var d=$('#dirtyDot'); if(d) d.style.display='inline-block'; }
window.addEventListener('beforeunload', function(e){ if(DIRTY){ e.preventDefault(); e.returnValue=''; } });

function assembleDb(){
  return { savedAt: nowStamp(), savedBy: CURRENT_USER, version: 1,
    orders: ORDERS, bookings: BOOKINGS, artworks: ARTWORKS, activity: ACTIVITY,
    assets: ASSETS, rateCards: RATE_CARDS, packages: PACKAGES, promoSpaces: PROMO_SPACES };
}
function applyDb(db){
  if(!db || !db.orders) throw new Error('Not a media tracker data file');
  ORDERS = db.orders; BOOKINGS = db.bookings||[]; ARTWORKS = db.artworks||[]; ACTIVITY = db.activity||[];
  if(db.assets) ASSETS = db.assets;
  if(db.rateCards) RATE_CARDS = db.rateCards;
  if(db.packages) PACKAGES = db.packages;
  if(db.promoSpaces) PROMO_SPACES = db.promoSpaces;
}
function exportData(){
  var a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(assembleDb(), null, 1));
  a.download = 'media_data.json';
  a.click();
  DIRTY = false; var d=$('#dirtyDot'); if(d) d.style.display='none';
}
function importData(input){
  var f = input.files && input.files[0]; if(!f) return;
  var r = new FileReader();
  r.onload = function(){
    try{ applyDb(JSON.parse(r.result)); closeDrawer(); render(); }
    catch(e){ alert('Could not read that file: '+e.message); }
  };
  r.readAsText(f);
  input.value = '';
}
function loadGithubJson(){
  // On startup, try to load the committed data file. Falls back to embedded placeholders.
  fetch(CONFIG.githubBase + 'Media/media_data.json', {cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(db){ applyDb(db); render(); console.log('Loaded media_data.json saved', db.savedAt, 'by', db.savedBy); })
    .catch(function(e){ console.log('No committed media_data.json yet — using placeholder data.', e.message); });
}

function saveNewBooking(){
  var brand = $('#nbBrand').value.trim();
  var from = $('#nbFrom').value, to = $('#nbTo').value;
  if(!brand){ alert('Brand is required.'); return; }
  if(!from || !to || to < from){ alert('Check the dates — “To” must be on or after “From”.'); return; }
  var pkId = $('#nbPackage').value || null;
  var pk = pkgBy(pkId);
  var directAssets = pkId ? [] : Array.prototype.slice.call($('#nbAssets').selectedOptions).map(function(o){return o.value;});
  if(!pk && !directAssets.length){ alert('Pick a vendor package, or select at least one screen for a custom booking.'); return; }
  var mon = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][Number(from.slice(5,7))-1];
  var name = $('#nbName').value.trim() || (brand.toUpperCase()+' '+mon+' '+from.slice(0,4)+(pk?' - '+pk.name.replace(/^NAM /,'NAM '):''));
  var no = ORDERS.reduce(function(mx,o){return Math.max(mx,o.no);}, 1000) + 1;
  var o = {
    no:no, vst:'', brand:brand, brandCode:$('#nbBrandCode').value.trim(), name:name,
    promo:$('#nbPromo').value, category:$('#nbCat').value,
    dateFrom:from, dateTo:to,
    owners:$('#nbOwners').value.split(',').map(function(s){return s.trim();}).filter(Boolean),
    buyer:$('#nbBuyer').value.trim(),
    status:'Active', stage:'Proposal Draft', wfDone:0,
    dealStatus:$('#nbDeal').value,
    assignedValue:Number($('#nbValue').value||0), actualSold:Number($('#nbValue').value||0),
    margin:0, productionCost:0, installCost:0, contentStatus:0,
    brandEmails:$('#nbEmails').value.split(',').map(function(s){return s.trim();}).filter(Boolean),
    proposal:{hideItemised:true,hideDfs:true,hideTotalCost:false,hideFloorPlans:false,hideProdInstall:true},
    packageId:pkId
  };
  ORDERS.push(o);
  if(pk){
    pk.assets.forEach(function(aid){
      var slot = findFreeSlot(aid, from, to);
      BOOKINGS.push({orderNo:no, assetId:aid, slot:slot, dateFrom:from, dateTo:to});
    });
  } else {
    directAssets.forEach(function(aid){
      var slot = findFreeSlot(aid, from, to);
      BOOKINGS.push({orderNo:no, assetId:aid, slot:slot, dateFrom:from, dateTo:to});
    });
  }
  logAct(no, 'Order created', pk ? pk.name : (directAssets.length+' screen(s) booked directly'));
  closeModal();
  go('orders');
  openOrder(no);
}

    if(f.promo && o.promo!==f.promo) return false;

/* ═══════════════ cross-tracker sync ═══════════════
   Content rail (0-4) and workflow checklist (0-6) must never disagree:
   a "Running" dot implies the creative pipeline is actually done, and
   a workflow step can't be marked done if the content isn't there yet.
   These tables are the single source of truth both directions clamp to. */
var CONTENT_MIN_WF = {0:0, 1:2, 2:3, 3:4, 4:6};   // min wfDone a content status requires
var WF_MAX_CONTENT  = {0:0, 1:0, 2:1, 3:2, 4:3, 5:3, 6:4}; // max content status a wfDone allows

var STAGE_BY_WF = ['Proposal Draft','Proposal Sent','Artwork Requested','Artwork Review','Scheduled / Photo Uploads','Wrap-up','Completed'];
function toggleWf(no, i){
  var o = orderBy(no); if(!o) return;
  var was = o.wfDone;
  o.wfDone = (o.wfDone > i) ? i : i+1;      // click a done step → roll back to it; click an undone step → complete through it
  o.stage = STAGE_BY_WF[o.wfDone] || o.stage;
  o.contentStatus = Math.min(o.contentStatus, WF_MAX_CONTENT[o.wfDone]);   // can't stay "Running" if workflow rolled back
  var step = WORKFLOW_STEPS[Math.max(o.wfDone,was)-1] || WORKFLOW_STEPS[0];
  logAct(no, o.wfDone>was ? step : ('Reverted: '+step));
  openOrder(no); render();
}
function cycleContent(no){
  var o = orderBy(no); if(!o) return;
  o.contentStatus = (o.contentStatus+1) % 5;
  o.wfDone = Math.max(o.wfDone, CONTENT_MIN_WF[o.contentStatus]);   // advancing content pulls the workflow forward with it
  o.stage = STAGE_BY_WF[o.wfDone] || o.stage;
  logAct(no, 'Content status → '+(o.contentStatus>0?STATUS_STEPS[o.contentStatus-1]:'cleared'));
  openOrder(no); render();
}

function saveOrderEdit(no){

  if(!from || !to || to < from){ alert('Check the dates — “To” must be on or after “From”.'); return; }

  o.brand=$('#eBrand').value.trim(); o.brandCode=$('#eBrandCode').value.trim(); o.name=$('#eName').value.trim();
  o.vst=$('#eVst').value.trim(); o.promo=$('#ePromo').value; o.dateFrom=from; o.dateTo=to;
  o.status=$('#eStatus').value; o.stage=$('#eStage').value.trim();
  o.assignedValue=Number($('#eAssigned').value||0); o.actualSold=Number($('#eSold').value||0);
  o.productionCost=Number($('#eProd').value||0); o.installCost=Number($('#eInst').value||0);
  o.margin=o.actualSold-o.productionCost-o.installCost;

function approveArtwork(awId){
  var a = ARTWORKS.find(function(x){return x.id===awId;}); if(!a) return;
  a.status='Approved'; a.approvedBy=CURRENT_USER; a.approvedAt=nowStamp();

  if(o){
    var allApproved = ARTWORKS.filter(function(x){return x.orderNo===o.no;}).every(function(x){return x.status==='Approved';});

function calMonths(){
  var out=[], y=STATE.cal.fromY, m=STATE.cal.fromM;
  for(var i=0;i<STATE.cal.months;i++){ out.push({y:y,m:m}); m++; if(m>12){m=1;y++;} }
  return out;
}
function openPromoCal(promo){ closeDrawer(); STATE.cal.mode='promo'; STATE.cal.highlight=promo; go('cal'); }
function setCalMode(m){ STATE.cal.mode=m; render(); }
function shiftCal(d){ var m=STATE.cal.fromM+d, y=STATE.cal.fromY; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;} STATE.cal.fromM=m; STATE.cal.fromY=y; render(); }

function vCal(){
  var months = calMonths();
  var head = '<div class="pgtitle"><h1>Calendar</h1><span class="sub">'+monthLabel(months[0].y,months[0].m)+' – '+monthLabel(months[months.length-1].y,months[months.length-1].m)+'</span>'+
    '<span class="calmode"><button class="'+(STATE.cal.mode==='promo'?'on':'')+'" onclick="setCalMode(\'promo\')">Promotions</button><button class="'+(STATE.cal.mode==='asset'?'on':'')+'" onclick="setCalMode(\'asset\')">Assets &amp; slots</button></span></div>'+
    '<div class="filters"><button class="btn ghost" onclick="shiftCal(-1)">‹ Earlier</button><button class="btn ghost" onclick="shiftCal(1)">Later ›</button></div>';
  return head + (STATE.cal.mode==='promo' ? promoCal(months) : assetCal(months));
}

function promoCal(months){
  var ths = months.map(function(mm){return '<th>'+monthLabel(mm.y,mm.m)+'</th>';}).join('');
  var rows = PROMO_SPACES.map(function(sp){
    var hl = STATE.cal.highlight===sp.id ? ' style="outline:2px solid var(--media)"' : '';
    var cells = months.map(function(mm){
      var os = ORDERS.filter(function(o){ return o.promo===sp.id && overlapsMonth(o.dateFrom,o.dateTo,mm.y,mm.m); });
      var inner = os.map(function(o){
        var cls = o.wfDone>=4 ? '' : ' pending';
        return '<div class="bkg'+cls+'" onclick="openOrder('+o.no+')"><span class="bn">'+esc(o.brand)+'</span> <span class="st">#'+o.no+'</span><br><span class="st">'+esc(o.stage)+'</span></div>';
      }).join('');
      return '<td>'+inner+'</td>';
    }).join('');
    return '<tr'+hl+'><td class="spacehead">'+esc(sp.id)+'<span class="loc">'+esc(sp.loc)+'</span></td>'+cells+'</tr>';
  }).join('');
  return '<div class="card calwrap"><table class="cal"><thead><tr><th style="width:130px">Promo space</th>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function assetCal(months){
  var ths = months.map(function(mm){return '<th>'+monthLabel(mm.y,mm.m)+'</th>';}).join('');
  var body = ASSETS.map(function(a){
    var head = '<tr><td class="assetcell" rowspan="'+(a.slots.length+1)+'"><span class="an" style="cursor:pointer" onclick="openAsset(\''+a.id+'\')">'+esc(a.name)+'</span><div class="ac">'+esc(a.division)+' › '+esc(a.location)+'</div><div class="ac"><b>Code:</b> '+esc(a.code)+' · '+esc(a.type)+'</div></td>'+
      months.map(function(){return '<td style="background:#f4f4f0"></td>';}).join('')+'</tr>';
    var slotRows = a.slots.map(function(owner,si){
      var cells = months.map(function(mm){
        var bs = BOOKINGS.filter(function(b){ return b.assetId===a.id && b.slot===si+1 && overlapsMonth(b.dateFrom,b.dateTo,mm.y,mm.m); });
        return '<td>'+bs.map(function(b){ var o=orderBy(b.orderNo)||{};
          return '<div class="bkg" onclick="openOrder('+b.orderNo+')"><span class="bn">'+esc(o.brand||'')+'</span><br><span class="st">'+esc(o.promo||'')+'</span></div>';
        }).join('')+'</td>';
      }).join('');
      return '<tr><td class="slotlbl"><b>Slot '+(si+1)+'</b><br><span class="so">'+esc(owner)+'</span></td>'+cells+'</tr>';
    }).join('');
    return head + slotRows;
  }).join('');
  return '<div class="card calwrap"><table class="cal slotcal"><thead><tr><th style="width:230px">Asset</th>'+ths+'</tr></thead><tbody>'+body+'</tbody></table></div>';
}

/* ═══════════════ assets ═══════════════ */
function vAssets(){
  return '<div class="pgtitle"><h1>Assets</h1><span class="sub">'+ASSETS.length+' screens &amp; packages</span></div>'+
  '<div class="card"><table class="grid"><thead><tr><th>Asset</th><th>Code</th><th>Location</th><th>Type</th><th>Slots</th><th>Rate</th><th>Live now</th></tr></thead><tbody>'+
  ASSETS.map(function(a){
    var rc = rateBy(a.rateCard);
    var live = BOOKINGS.filter(function(b){return b.assetId===a.id && overlapsMonth(b.dateFrom,b.dateTo,2026,7);});
    var liveHtml = live.map(function(b){var o=orderBy(b.orderNo)||{}; return '<span class="chip" onclick="event.stopPropagation();openOrder('+b.orderNo+')">'+esc(o.brand||'')+'</span>';}).join(' ')||'<span class="mut sm">—</span>';
    return '<tr class="rowlink" onclick="openAsset(\''+a.id+'\')"><td class="b">'+esc(a.name)+'</td><td class="sm mut">'+esc(a.code)+'</td><td class="sm">'+esc(a.division)+' › '+esc(a.location)+'</td><td class="sm">'+esc(a.type)+'</td><td class="sm">'+a.slots.length+'</td><td class="sm money">'+(rc?'$'+rc.rate.toLocaleString()+'/'+rc.per:'—')+'</td><td>'+liveHtml+'</td></tr>';
  }).join('')+'</tbody></table></div>';
}

/* ═══════════════ rate cards ═══════════════ */
function vRates(){
  return '<div class="pgtitle"><h1>Rate Cards</h1><span class="sub">standard monthly rates — edit in the workbook once live data is connected</span></div>'+
  '<div class="pkcards">'+RATE_CARDS.map(function(r){
    var used = PACKAGES.filter(function(p){return p.rateCard===r.id;});
    return '<div class="pk"><div class="nm">'+esc(r.name)+'</div><div class="rate">$'+r.rate.toLocaleString()+' <span>/ '+esc(r.per)+'</span></div><div class="inc">'+esc(r.includes)+'</div>'+
      (r.notes?'<div class="inc mut">'+esc(r.notes)+'</div>':'')+
      '<div class="foot">'+used.map(function(p){return '<span class="chip" onclick="go(\'packs\')">'+esc(p.name)+'</span>';}).join('')+'</div></div>';
  }).join('')+'</div>';
}

/* ═══════════════ vendor packs ═══════════════ */
function vPacks(){
  return '<div class="pgtitle"><h1>Vendor Packages</h1><span class="sub">what a brand buys — assets bundled under one rate</span></div>'+
  '<div class="pkcards">'+PACKAGES.map(function(p){
    var rc = rateBy(p.rateCard);
    var orders = ORDERS.filter(function(o){return o.packageId===p.id;});
    return '<div class="pk"><div class="nm">'+esc(p.name)+'</div>'+
      (rc?'<div class="rate">$'+rc.rate.toLocaleString()+' <span>/ '+rc.per+'</span></div>':'')+
      '<div class="inc">'+esc(p.audience)+'</div>'+
      '<div class="inc"><b>Includes:</b> '+p.assets.map(function(id){var a=assetBy(id)||{};return '<span class="chip" onclick="openAsset(\''+id+'\')">'+esc(a.name||id)+'</span>';}).join(' ')+'</div>'+
      '<div class="foot">'+(orders.length?orders.map(function(o){return '<span class="chip" onclick="openOrder('+o.no+')">#'+o.no+' '+esc(o.brand)+'</span>';}).join(''):'<span class="mut sm">No orders yet</span>')+'</div></div>';
  }).join('')+'</div>';
}

/* ═══════════════ DAM ═══════════════ */
function setDamProvider(p){ CONFIG.dam.provider=p; render(); }
function vDam(){
  var p = CONFIG.dam.provider;
  var provHtml =
    damOpt('github','GitHub repo (current)','Artwork committed to dfa_birdseye/Artwork/, served from jeffenlow.github.io — works on locked-down networks', p==='github', 'ok', 'Connected — repo pattern in use')+
    damOpt('bynder','Bynder','OAuth2 permanent token → POST /api/v4/media for upload, asset URLs link back here', p==='bynder', CONFIG.dam.bynder.token?'ok':'warn', CONFIG.dam.bynder.token?'Token configured':'Needs portal URL + token in CONFIG.dam.bynder')+
    damOpt('aem','Adobe Experience Manager','AEM Assets HTTP API — POST /api/assets/{folder} to create, GET rendition URLs for the calendar', p==='aem', CONFIG.dam.aem.host?'ok':'warn', CONFIG.dam.aem.host?'Host configured':'Needs author host in CONFIG.dam.aem');

  var rows = ARTWORKS.map(function(a){
    var o = orderBy(a.orderNo)||{}; var as = assetBy(a.assetId)||{};
    return '<tr><td><span class="thumb">'+esc(o.brand||'').slice(0,2).toUpperCase()+'</span></td>'+
      '<td class="sm"><b>'+esc(a.file)+'</b><div class="mut">'+esc(a.id)+'</div></td>'+
      '<td class="sm"><a class="lnk" href="#" onclick="openOrder('+a.orderNo+');return false">#'+a.orderNo+' '+esc(o.brand||'')+'</a></td>'+
      '<td class="sm">'+esc(as.name||'')+'</td>'+
      '<td><span class="pill '+(a.status==='Approved'?'active':'draft')+'">'+esc(a.status)+'</span></td>'+
      '<td class="sm">'+(a.damUrl?'<a class="lnk" href="'+esc(a.damUrl)+'" target="_blank" rel="noopener">In DAM</a>':'<button class="btn ghost" style="padding:4px 10px;font-size:.74rem" onclick="pushToDam(\''+a.id+'\')">Send to DAM</button>')+'</td></tr>';
  }).join('');

  return '<div class="pgtitle"><h1>Artwork &amp; DAM</h1><span class="sub">every artwork links to an order, an asset, and a DAM record</span></div>'+
  '<div class="card" style="margin-bottom:16px"><h2>Storage provider</h2><div class="damprov">'+provHtml+'</div>'+
  '<div style="padding:0 18px 16px"><div class="note">'+damNote(p)+'</div></div></div>'+
  '<div class="card"><h2>Artwork library</h2><table class="grid"><thead><tr><th></th><th>File</th><th>Order</th><th>Asset</th><th>Status</th><th>DAM</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function damOpt(id,name,desc,on,statCls,statTxt){
  return '<div class="damopt'+(on?' on':'')+'" onclick="setDamProvider(\''+id+'\')"><div class="n">'+name+'</div><div class="d">'+desc+'</div><div class="damstat '+statCls+'">'+statTxt+'</div></div>';
}
function damNote(p){
  if(p==='github') return '<b>GitHub mode:</b> commit approved artwork files to <code>dfa_birdseye/Artwork/</code>, then set each artwork\'s <code>damUrl</code> in the workbook to its <code>jeffenlow.github.io</code> URL. Zero new infrastructure; same pattern as the map app\'s data files.';
  if(p==='bynder') return '<b>Bynder mode:</b> fill in <code>CONFIG.dam.bynder.portal</code> (e.g. dfa.bynder.com) and a permanent OAuth2 token. Uploads call <code>POST https://{portal}/api/v4/media</code> and store the returned media id + CDN URL on the artwork record. Note: Bynder\'s API requires CORS to be enabled for your domain (dfabirdseye.com) in the Bynder portal settings, or requests must go through a small proxy.';
  return '<b>AEM Assets mode:</b> fill in <code>CONFIG.dam.aem.host</code> (author instance). Uploads use the Assets HTTP API: <code>POST {host}/api/assets/dfa-media/{orderNo}</code> with the file binary; the calendar and order drawer then read rendition URLs like <code>{host}/api/assets/…/renditions/original</code>. Requires an AEM service credential — the token should live in a proxy, not this file.';
}
function pushToDam(awId){
  var a = ARTWORKS.find(function(x){return x.id===awId;}); if(!a) return;
  var p = CONFIG.dam.provider;
  if(p==='github'){
    a.damUrl = CONFIG.dam.github.base + encodeURIComponent(a.file);
    alert('Marked as stored in GitHub DAM.\n\nCommit the file to dfa_birdseye/Artwork/ so this URL resolves:\n'+a.damUrl);
  } else if(p==='bynder'){
    if(!CONFIG.dam.bynder.token){ alert('Bynder is not configured yet.\nSet CONFIG.dam.bynder.portal and .token, then retry.'); return; }
    alert('Bynder upload stub — wire fetch(POST https://'+CONFIG.dam.bynder.portal+'/api/v4/media) here.');
  } else {
    if(!CONFIG.dam.aem.host){ alert('AEM is not configured yet.\nSet CONFIG.dam.aem.host, then retry.'); return; }
    alert('AEM upload stub — wire fetch(POST '+CONFIG.dam.aem.host+'/api/assets/dfa-media/'+a.orderNo+') here.');
  }
  render();
}

/* ═══════════════ activity page ═══════════════ */
function vActivity(){
  var evs = ACTIVITY.slice().sort(function(a,b){return b.at<a.at?-1:1;});
  return '<div class="pgtitle"><h1>Activity</h1><span class="sub">all orders, newest first</span></div>'+
  '<div class="card">'+feedHtml(evs,true)+'</div>';
}

/* ═══════════════ github data loader (opt-in) ═══════════════ */
function loadGithubData(){
  // Loads CONFIG.githubXlsx via SheetJS and replaces the embedded arrays.
  // Sheets: Orders, Assets, Bookings, RateCards, Packages, Activity, Artworks.
  var s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = function(){
    fetch(CONFIG.githubXlsx).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.arrayBuffer(); })
    .then(function(buf){
      var wb = XLSX.read(buf, {type:'array'});   // no cellDates — dates parsed as serials, converted UTC
      // TODO: map sheets → ORDERS / ASSETS / BOOKINGS / RATE_CARDS / PACKAGES / ACTIVITY / ARTWORKS.
      // Excel serial date → ISO: new Date(Date.UTC(1899,11,30) + serial*86400000).toISOString().slice(0,10)
      console.log('Workbook loaded:', wb.SheetNames);
      render();
    })
    .catch(function(e){ console.warn('GitHub data load failed, staying on embedded data:', e); });
  };
  s.onerror = function(){ console.warn('SheetJS CDN blocked — bundle xlsx.full.min.js inline for locked-down networks.'); };
  document.head.appendChild(s);
}

/* ═══════════════ init ═══════════════ */
if(CONFIG.dataSource==='github') loadGithubData();
loadGithubJson();     // pick up committed edits from dfa_birdseye/Media/media_data.json (no-op if absent)
render();
</script>
